<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Hacker Zone</title>
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(180deg, #000, #330000);
      color: #ff0000;
    }

    header {
      text-align: center;
      padding: 30px;
      font-size: 2em;
      text-shadow: 0 0 20px #ff0000;
    }

    form {
      max-width: 400px;
      margin: 50px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea {
      padding: 10px;
      border: 1px solid #ff0000;
      background-color: #1a0000;
      color: #fff;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      background-color: #ff0000;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #fff;
      color: #ff0000;
    }

    a {
      color: #ff0000;
      text-decoration: none;
      font-weight: bold;
      display: block;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>Contact Us</header>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea rows="5" placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
  </form>
  <a href="index.html">⬅ Back to Home</a>
</body>
</html>
