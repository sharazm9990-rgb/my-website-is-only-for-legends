<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacker Zone</title>
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle, #000 0%, #1a0000 100%);
      color: #ff0000;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 30px;
      font-size: 2.5em;
      text-shadow: 0 0 20px #ff0000;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ff0000; }
      to { text-shadow: 0 0 30px #ff3300; }
    }

    nav {
      text-align: center;
      margin-top: 20px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff0000;
      text-shadow: 0 0 10px #ff3300;
    }

    .content {
      text-align: center;
      margin-top: 100px;
      font-size: 1.5em;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(1.05); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <header>⚡ HACKER ZONE ⚡</header>
  <nav>
    <a href="about.html">About</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="content">
    <p>Welcome to the ultimate red lightning hacking interface.</p>
  </div>
</body>
</html>
